<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>
    {% block script %}{% endblock %}
    <style>{% block style %}{% endblock %}</style>

      <div class="container header-inner">
          <div class="logo">
              <h1>Rail Transport & Urban Mobility</h1>
              <p>Understanding rail systems | Sustainable City Development</p>
          </div>
          <ul class="nav-links">
              <li><a href="{% url 'index' %}" class="active">Home</a></li>
              <li><a href="#">Blogs</a></li>
              <li><a href="#">Journals</a></li>
              <li><a href="#">Media</a></li>
              <li><a href="#">Gallery</a></li>
              <li><a href="{% url 'login' %}">Login</a></li>
              <li><a href="{% url 'registration' %}">Register</a></li>
          </ul>
      </div>
  </header>
    {% load static %}
    <link rel="stylesheet" type="text/css" href="{% static 'ISO/css/main.css' %}"/>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">

    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- favicon link -->

  <body>
    {% block content %}{% endblock %}

</html>
