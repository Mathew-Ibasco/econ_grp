{% extends 'econ/layout.html' %}
{% load static %}
{% load i18n %}
{% block title %}
Login page
{% endblock %}
{% block content %}
    <form method="POST">
        {% csrf_token %}
        <label for="username">Username</label>
        <br>
        <input type="text" id="username" name="username" placeholder="Username">
        <br>
        <label for="password">Password</label>
        <br>
        <input type="password" id="password" name="password" placeholder="Password">
        <br>
        <button class="submitBtn" formaction="{% url 'login_process' %}" type="submit" style="border: none; font-weight: bold;">Login</button>
        {% if error %}<p>{{ error }}</p>{% endif %}
    </form>
{% endblock %}
