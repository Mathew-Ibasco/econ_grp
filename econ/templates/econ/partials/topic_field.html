<div class="mb-3" data-topic-field>
    <label class="form-label">Topic <small class="text-muted">Select existing topics or choose Other to add one.</small></label>
    <select name="topic_choice" class="form-control" data-topic-select>
        <option value="">Select a topic</option>
        {% for topic in topic_options %}
            <option value="{{ topic.id }}">{{ topic.title }}</option>
        {% endfor %}
        <option value="{{ topic_other_value }}" {% if values.topic_choice == topic_other_value %}selected{% endif %}>Other</option>
    </select>
    {% if errors.topics %}
        <div class="text-danger field-error" role="alert">{{ errors.topics }}</div>
    {% endif %}
    <input type="text" name="topic_other" class="form-control admin-topic-other-field" value="{{ values.topic_other }}" placeholder="Enter new topic" data-topic-other-field>
    <div class="admin-topic-action-row">
        <button type="button" class="btn btn-secondary admin-topic-reset" data-topic-reset>Choose Existing Topic</button>
        <div class="admin-topic-selected-list" data-topic-selected-list>
            {% for selected_topic in selected_topic_pairs %}
                <span class="admin-topic-chip" data-topic-chip data-topic-id="{{ selected_topic.id }}">
                    <span>{{ selected_topic.title }}</span>
                    <button type="button" data-topic-remove aria-label="Remove topic">&times;</button>
                    <input type="hidden" name="topic_choices" value="{{ selected_topic.id }}">
                </span>
            {% endfor %}
        </div>
    </div>
    {% if errors.topic_other %}
        <div class="text-danger field-error" role="alert">{{ errors.topic_other }}</div>
    {% endif %}
</div>
