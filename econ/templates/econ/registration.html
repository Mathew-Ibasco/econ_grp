{% extends 'econ/layout.html' %}
{% load static %}
{% load i18n %}
{% block title %}
Registration page
{% endblock %}
{% block content %}
    <form method="POST">
        {% csrf_token %}
        <label for="username">Username</label>
        <br>
        <input type="text" id="username" name="username" placeholder="Username" required>
        <br>

        <label for="email">Username</label>
        <br>
        <input type="text" id="email" name="email" placeholder="emailname@gmail.com">
        <br>

        <label for="bio">Bio</label>
        <br>
        <textarea id="bio" name="bio" placeholder="Tell us about yourself"></textarea>
        <br>

        <label for="password">Password</label>
        <br>
        <input type="password" id="password" name="password" placeholder="Password" required>
        <br>

        <label for="confirm">Confirm Password</label>
        <br>
        <input type="password" id="confirm" name="confirm" placeholder="Confirm Password" required>
        <br>

        <button class="submitBtn" formaction="{% url 'registration_process' %}" type="submit" style="border: none; font-weight: bold;">Register</button>
        {% if error %}<p>{{ error }}</p>{% endif %}
    </form>


{% endblock %}
